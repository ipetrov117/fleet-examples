kind: Bundle
apiVersion: fleet.cattle.io/v1alpha1
metadata:
  name: rke2-upgrade-plan
  namespace: fleet-default
spec:
  resources:
  - content: |
      # control-plane upgrade plan
      apiVersion: upgrade.cattle.io/v1
      kind: Plan
      metadata:
        name: rke2-plan-cp
        namespace: system-upgrade
        labels:
          rke2-upgrade: control-plane
      spec:
        concurrency: 1
        nodeSelector:
          matchExpressions:
            # will trigger upgrade for any node containing the 'node-role.kubernetes.io/control-plane' label
            - {key: node-role.kubernetes.io/control-plane, operator: In, values: ["true"]}
        tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Equal"
          value: "true"
          effect: "NoExecute"
        serviceAccountName: system-upgrade
        cordon: true
        upgrade:
          image: rancher/rke2-upgrade
        version: v1.28.8+rke2r1
      ---
      # worker upgrade plan
      apiVersion: upgrade.cattle.io/v1
      kind: Plan
      metadata:
        name: rke2-plan-wk
        namespace: system-upgrade
        labels:
          rke2-upgrade: worker
      spec:
        concurrency: 2
        nodeSelector:
          matchExpressions:
            # will trigger upgrade for any node that does not contain the 'node-role.kubernetes.io/control-plane' label
            - {key: node-role.kubernetes.io/control-plane, operator: NotIn, values: ["true"]}
        prepare:
          args:
          - prepare
          - rke2-plan-cp
          image: rancher/rke2-upgrade
        serviceAccountName: system-upgrade
        cordon: true
        drain:
          force: true
        upgrade:
          image: rancher/rke2-upgrade
        version: v1.28.8+rke2r1
    name: rke2-plan-bundle.yaml
  targets:
  # Match everything
  - clusterSelector: {}
